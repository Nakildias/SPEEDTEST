<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#090A0F" />
  <title>Speedtest</title>
  <style>
    :root {
      --bg: #0c0e14;
      --stars-base: #090a0f;
      --border: #252a3a;
      --text: #e8eaef;
      --muted: #8b92a8;
      --accent: #00c853;
      --accent-dim: #00a344;
      --download: #2962ff;
      --upload: #aa00ff;
      --ping: #00bcd4;
      --gauge-track: #2a3148;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      /* Parallax stars — https://codepen.io/sarazond/pen/LYGbwj (Gitssy stars.html) */
      --stars-small: 1309px 228px #fff, 51px 1518px #fff, 563px 501px #fff, 457px 285px #fff, 1508px 209px #fff, 1385px 1516px #fff, 1827px 1116px #fff, 178px 1209px #fff, 864px 65px #fff, 61px 191px #fff, 447px 476px #fff, 1034px 1232px #fff, 54px 1149px #fff, 407px 1466px #fff, 1330px 1436px #fff, 1116px 859px #fff, 451px 919px #fff, 1206px 569px #fff, 1657px 1780px #fff, 13px 1554px #fff, 1650px 326px #fff, 1429px 865px #fff, 696px 569px #fff, 318px 440px #fff, 1960px 1563px #fff, 689px 209px #fff, 189px 778px #fff, 198px 735px #fff, 1735px 704px #fff, 1236px 541px #fff, 1652px 88px #fff, 1494px 940px #fff, 1098px 255px #fff, 1992px 1888px #fff, 775px 161px #fff, 1130px 600px #fff, 1698px 1287px #fff, 1266px 1813px #fff, 1764px 740px #fff, 1182px 393px #fff, 1442px 142px #fff, 93px 1354px #fff, 466px 1583px #fff, 592px 163px #fff, 1751px 476px #fff, 1774px 206px #fff, 778px 569px #fff, 928px 1301px #fff, 1708px 747px #fff, 333px 758px #fff, 727px 429px #fff, 1372px 546px #fff, 1437px 1918px #fff, 1399px 1327px #fff, 146px 1247px #fff, 1300px 350px #fff;
      --stars-med: 1093px 1493px #fff, 501px 334px #fff, 946px 777px #fff, 552px 1895px #fff, 1310px 1409px #fff, 1140px 449px #fff, 1402px 664px #fff, 1726px 1573px #fff, 1589px 114px #fff, 469px 1683px #fff, 65px 1648px #fff, 646px 821px #fff, 548px 135px #fff, 432px 1870px #fff, 1931px 1161px #fff, 1794px 1470px #fff, 644px 435px #fff;
      --stars-big: 1309px 228px #fff, 51px 1518px #fff, 563px 501px #fff, 457px 285px #fff, 1508px 209px #fff, 1385px 1516px #fff, 1827px 1116px #fff, 178px 1209px #fff;
    }
    * { box-sizing: border-box; }
    html {
      background-color: var(--stars-base);
      min-height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      font-family: var(--font);
      background: transparent;
      color: var(--text);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #background-stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    }
    #background-stars .bg-stars-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      background: transparent;
      box-shadow: var(--stars-small);
      animation: bg-animStar 50s linear infinite;
    }
    #background-stars .bg-stars-layer::after {
      content: " ";
      position: absolute;
      top: 2000px;
      left: 0;
      width: 1px;
      height: 1px;
      background: transparent;
      box-shadow: var(--stars-small);
    }
    #background-stars .bg-stars-layer-2 {
      width: 2px;
      height: 2px;
      box-shadow: var(--stars-med);
      animation: bg-animStar 100s linear infinite;
    }
    #background-stars .bg-stars-layer-2::after {
      width: 2px;
      height: 2px;
      box-shadow: var(--stars-med);
    }
    #background-stars .bg-stars-layer-3 {
      width: 3px;
      height: 3px;
      box-shadow: var(--stars-big);
      animation: bg-animStar 150s linear infinite;
    }
    #background-stars .bg-stars-layer-3::after {
      width: 3px;
      height: 3px;
      box-shadow: var(--stars-big);
    }
    /* Glow scales with layer (1px → 2px → 3px “stars”) via stacked drop-shadows */
    #background-stars #stars {
      filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.95)) drop-shadow(0 0 3px rgba(255, 255, 255, 0.38))
        drop-shadow(0 0 6px rgba(200, 220, 255, 0.14));
    }
    #background-stars #stars2 {
      filter: drop-shadow(0 0 1.5px rgba(255, 255, 255, 1)) drop-shadow(0 0 5px rgba(255, 255, 255, 0.45))
        drop-shadow(0 0 11px rgba(190, 215, 255, 0.22)) drop-shadow(0 0 18px rgba(160, 190, 255, 0.08));
    }
    #background-stars #stars3 {
      filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 7px rgba(255, 255, 255, 0.55))
        drop-shadow(0 0 16px rgba(180, 205, 255, 0.32)) drop-shadow(0 0 26px rgba(150, 180, 255, 0.14));
    }
    @keyframes bg-animStar {
      from { transform: translateY(0); }
      to { transform: translateY(-2000px); }
    }
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: max(12px, env(safe-area-inset-top)) 20px 14px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--text);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(9, 10, 15, 0.1);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .site-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: calc(52px + env(safe-area-inset-top, 0px)) max(20px, env(safe-area-inset-right, 0px))
        calc(92px + env(safe-area-inset-bottom, 0px)) max(20px, env(safe-area-inset-left, 0px));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 12px 16px max(14px, env(safe-area-inset-bottom));
      text-align: center;
      font-size: 0.76rem;
      line-height: 1.55;
      color: var(--muted);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(9, 10, 15, 0.1);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .site-footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.22s ease, text-shadow 0.22s ease;
    }
    .site-footer a:hover {
      color: #8ab8ff;
      text-decoration: none;
      text-shadow: 0 0 12px rgba(68, 138, 255, 0.85), 0 0 26px rgba(41, 98, 255, 0.45);
    }
    .site-footer-by {
      font-weight: 400;
      color: var(--muted);
    }
    .site-footer-license {
      margin-top: 4px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .site-footer-license a {
      font-weight: 600;
    }
    .wrap {
      width: 100%;
      max-width: 420px;
      padding: 8px 0 0;
    }
    .gauge-wrap {
      position: relative;
      height: 212px;
      margin: 8px 0 16px;
    }
    .gauge-wrap svg {
      display: block;
      width: 100%;
      height: 212px;
    }
    .gauge-wrap .gauge-label {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      fill: var(--muted);
    }
    .speed-readout {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }
    .speed-readout .value {
      font-size: 2.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .speed-readout .unit {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .phase {
      text-align: center;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 12px;
      min-height: 1.2em;
      text-shadow: none;
      transition: color 0.28s ease, text-shadow 0.28s ease;
    }
    .phase.download {
      color: var(--download);
      text-shadow: 0 0 12px rgba(41, 98, 255, 0.85), 0 0 26px rgba(41, 98, 255, 0.5),
        0 0 44px rgba(41, 98, 255, 0.22);
    }
    .phase.upload {
      color: var(--upload);
      text-shadow: 0 0 12px rgba(170, 0, 255, 0.85), 0 0 26px rgba(170, 0, 255, 0.52),
        0 0 44px rgba(200, 100, 255, 0.2);
    }
    .phase.ping { color: var(--ping); }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 0;
    }
    .stat {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .stat.stat-wide {
      grid-column: span 2;
    }
    .stat label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .stat span {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }
    .stat.stat-wide span {
      font-size: 1.42rem;
    }
    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
      align-items: stretch;
    }
    button.btn-stats-open {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      background: rgba(14, 18, 32, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }
    button.btn-stats-open:hover {
      background: rgba(22, 28, 48, 0.52);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    button.primary {
      position: relative;
      overflow: hidden;
      width: 100%;
      margin-top: 0;
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(180deg, rgba(68, 138, 255, 0.52) 0%, rgba(41, 98, 255, 0.42) 100%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: none;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    button.primary::before {
      content: "";
      position: absolute;
      inset: -30% -60%;
      background: linear-gradient(
        115deg,
        transparent 38%,
        rgba(255, 255, 255, 0.45) 50%,
        transparent 62%
      );
      transform: translateX(-65%);
      transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    button.primary:hover:not(:disabled) {
      background: linear-gradient(180deg, rgba(82, 150, 255, 0.62) 0%, rgba(50, 110, 255, 0.5) 100%);
      border-color: rgba(255, 255, 255, 0.3);
    }
    button.primary:hover:not(:disabled)::before {
      transform: translateX(65%);
    }
    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    button.primary:disabled::before {
      display: none;
    }
    .stats-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }
    .stats-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .stats-modal-scrim {
      position: absolute;
      inset: 0;
      background: rgba(4, 6, 12, 0.55);
      cursor: pointer;
      transition: opacity 0.28s ease;
    }
    .stats-modal-panel {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      max-height: min(88vh, 720px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: rgba(20, 24, 36, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      opacity: 0;
      transition: opacity 0.28s ease;
    }
    .stats-modal.is-open .stats-modal-panel {
      opacity: 1;
    }
    .stats-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.12);
    }
    .stats-modal-title {
      margin: 0;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    button.stats-modal-close {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      padding: 0;
      line-height: 1;
      font-size: 1.35rem;
      font-weight: 300;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    button.stats-modal-close:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--border);
    }
    .stats-modal-body {
      padding: 14px 16px 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .note {
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .note:empty {
      display: none;
    }
  </style>
</head>
<body>
  <div id="background-stars" aria-hidden="true">
    <div id="stars" class="bg-stars-layer"></div>
    <div id="stars2" class="bg-stars-layer bg-stars-layer-2"></div>
    <div id="stars3" class="bg-stars-layer bg-stars-layer-3"></div>
  </div>
  <header class="site-header">SPEEDTEST</header>
  <main class="site-main">
  <div class="wrap">
      <div id="phase" class="phase">Ready</div>

      <div class="gauge-wrap">
        <!-- Wider viewBox + upper semicircle: labels use y = cy - r*sin(θ) so ticks sit outside the arc, not clipped below -->
        <svg viewBox="-30 -8 300 136" aria-hidden="true">
          <defs>
            <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#2962ff" />
              <stop offset="50%" style="stop-color:#00c853" />
              <stop offset="100%" style="stop-color:#aa00ff" />
            </linearGradient>
          </defs>
          <!-- Explicit TOP semicircle: single elliptical arc from (40,120) to (200,120) with sweep=0 is the BOTTOM cup in SVG; use two 90° arcs via the peak (120,40) so the stroke matches the scale above the baseline -->
          <path
            id="gauge-track"
            d="M 40 120 A 80 80 0 0 1 120 40 A 80 80 0 0 1 200 120"
            fill="none"
            stroke="var(--gauge-track)"
            stroke-width="14"
            stroke-linecap="butt"
          />
          <path
            id="gauge-fill"
            d="M 40 120 A 80 80 0 0 1 120 40 A 80 80 0 0 1 200 120"
            fill="none"
            stroke="url(#arcGrad)"
            stroke-width="14"
            stroke-linecap="butt"
            stroke-dasharray="251.33"
            stroke-dashoffset="251.33"
            style="transition: stroke-dashoffset 0.15s ease-out"
          />
          <g id="gauge-labels"></g>
        </svg>
        <div class="speed-readout">
          <div id="speed-value" class="value">0</div>
          <div id="speed-unit" class="unit">Mbps</div>
        </div>
      </div>

      <div class="btn-stack">
        <button type="button" class="btn-stats-open" id="btn-open-stats">Results</button>
        <button type="button" class="primary" id="btn-start">START</button>
      </div>
      <p class="note" id="duplex-note"></p>
  </div>
  </main>
  <footer class="site-footer">
    <div class="site-footer-line">
      <a href="https://github.com/Nakildias/SPEEDTEST" target="_blank" rel="noopener noreferrer">SPEEDTEST</a><span class="site-footer-by"> by </span><a href="https://github.com/Nakildias" target="_blank" rel="noopener noreferrer">Nakildias</a>
    </div>
    <div class="site-footer-license">
      Licensed under
      <a href="https://www.gnu.org/licenses/old-licenses/gpl-2.0.en.html" target="_blank" rel="noopener noreferrer license">GPLv2</a>
    </div>
  </footer>

  <div
    id="stats-modal"
    class="stats-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="stats-modal-title"
    aria-hidden="true"
  >
    <div class="stats-modal-scrim" id="stats-modal-scrim"></div>
    <div class="stats-modal-panel">
      <div class="stats-modal-head">
        <h2 class="stats-modal-title" id="stats-modal-title">Results</h2>
        <button type="button" class="stats-modal-close" id="stats-modal-close" aria-label="Close results">
          ×
        </button>
      </div>
      <div class="stats-modal-body">
        <div class="stats">
          <div class="stat stat-wide">
            <label>Your IP address</label>
            <span id="client-ip-val">—</span>
          </div>
          <div class="stat stat-wide">
            <label>Ping</label>
            <span id="ping-val">—</span>
          </div>
          <div class="stat">
            <label>Download ping</label>
            <span id="ping-dl-val">—</span>
          </div>
          <div class="stat">
            <label>Upload ping</label>
            <span id="ping-ul-val">—</span>
          </div>
          <div class="stat stat-wide">
            <label>Peak</label>
            <span id="peak-val">—</span>
          </div>
          <div class="stat">
            <label>Download avg</label>
            <span id="dl-avg">—</span>
          </div>
          <div class="stat">
            <label>Upload avg</label>
            <span id="ul-avg">—</span>
          </div>
          <div class="stat">
            <label>Total downloaded</label>
            <span id="dl-bytes-val">—</span>
          </div>
          <div class="stat">
            <label>Total uploaded</label>
            <span id="ul-bytes-val">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      /* Tunables */
      const TEST_DURATION_MS = 10000;
      const PING_UNDER_LOAD_MS = 5000;
      const PAUSE_AFTER_DOWNLOAD_MS = 1000;
      const GAUGE_RESET_MS = 600;
      const PARALLEL_UPLOAD_STREAMS = 6;
      /**
       * Fetch download streams per origin. Browsers enforce ~6 concurrent HTTP/1.1 connections
       * per host:port; six saturated download sockets leave no slot for /api/latency, so ping
       * during download queues for seconds (stalled in the browser, not the server).
       */
      const PARALLEL_DOWNLOAD_STREAMS = 5;
      const GAUGE_DEFAULT_MAX_MBPS = 100;
      const EMA_ALPHA = 0.22;
      const ARC_LEN = Math.PI * 80; /* radius 80 semicircle */
      const GAUGE_CX = 120;
      const GAUGE_CY = 120;
      /** Label radius: just outside the stroke (~87); nudged out slightly for breathing room. */
      const LABEL_R = 104;
      /** Five dial labels: 0, 25%, 50%, 75%, 100% of max (e.g. 0–100 Mbps or 0–250–500–750–1000). */
      const GAUGE_LABEL_FRACS = [0, 0.25, 0.5, 0.75, 1];

      /**
       * Build same-origin API URL under the current page’s directory. Root-absolute paths like
       * /api/upload resolve to the site origin only — wrong when the app is served from a subpath
       * (e.g. Gitssy /shells/webview/…/), which often yields HTTP 404 on upload while download/ping
       * appear to work if cached or routed differently.
       */
      function apiUrl(path) {
        const rel = String(path || "").replace(/^\/+/, "");
        const u = new URL(window.location.href);
        let pathname = u.pathname;
        if (!pathname.endsWith("/")) {
          const last = pathname.slice(pathname.lastIndexOf("/") + 1);
          if (last.includes(".")) {
            pathname = pathname.slice(0, pathname.lastIndexOf("/") + 1);
          } else {
            pathname += "/";
          }
        }
        u.pathname = pathname + rel;
        u.hash = "";
        u.search = "";
        return u.href;
      }

      const phaseEl = document.getElementById("phase");
      const speedValueEl = document.getElementById("speed-value");
      const pingValEl = document.getElementById("ping-val");
      const pingDlValEl = document.getElementById("ping-dl-val");
      const pingUlValEl = document.getElementById("ping-ul-val");
      const peakValEl = document.getElementById("peak-val");
      const dlAvgEl = document.getElementById("dl-avg");
      const ulAvgEl = document.getElementById("ul-avg");
      const dlBytesValEl = document.getElementById("dl-bytes-val");
      const ulBytesValEl = document.getElementById("ul-bytes-val");
      const btnStart = document.getElementById("btn-start");
      const gaugeFill = document.getElementById("gauge-fill");
      const gaugeLabels = document.getElementById("gauge-labels");
      const speedUnitEl = document.getElementById("speed-unit");
      const duplexNote = document.getElementById("duplex-note");
      const clientIpValEl = document.getElementById("client-ip-val");
      const statsModal = document.getElementById("stats-modal");
      const btnOpenStats = document.getElementById("btn-open-stats");
      const statsModalScrim = document.getElementById("stats-modal-scrim");
      const statsModalClose = document.getElementById("stats-modal-close");

      /** Scale top (Mbps); grows with observed speeds, resets each full test. */
      let gaugeMaxMbps = GAUGE_DEFAULT_MAX_MBPS;

      const activeDownloadAborts = new Set();
      const activeUploadXhrs = new Set();

      function abortAllInFlight() {
        activeDownloadAborts.forEach(function (c) {
          try {
            c.abort();
          } catch (e) {}
        });
        activeDownloadAborts.clear();
        activeUploadXhrs.forEach(function (x) {
          try {
            x.abort();
          } catch (e) {}
        });
        activeUploadXhrs.clear();
      }

      window.addEventListener("pagehide", abortAllInFlight);
      window.addEventListener("beforeunload", abortAllInFlight);

      duplexNote.textContent = "";

      let statsModalPrevFocus = null;

      function openStatsModal() {
        statsModalPrevFocus = document.activeElement;
        statsModal.classList.add("is-open");
        statsModal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        statsModalClose.focus();
      }

      function closeStatsModal() {
        statsModal.classList.remove("is-open");
        statsModal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        if (statsModalPrevFocus && typeof statsModalPrevFocus.focus === "function") {
          statsModalPrevFocus.focus();
        }
        statsModalPrevFocus = null;
      }

      btnOpenStats.addEventListener("click", openStatsModal);
      statsModalScrim.addEventListener("click", closeStatsModal);
      statsModalClose.addEventListener("click", closeStatsModal);
      document.addEventListener("keydown", function (ev) {
        if (ev.key === "Escape" && statsModal.classList.contains("is-open")) {
          closeStatsModal();
        }
      });

      async function refreshClientIp() {
        try {
          const r = await fetch(apiUrl("/api/client-ip"), { cache: "no-store" });
          if (!r.ok) throw new Error("ip");
          const j = await r.json();
          clientIpValEl.textContent =
            j && typeof j.ip === "string" && j.ip.length ? j.ip : "—";
        } catch (e) {
          clientIpValEl.textContent = "—";
        }
      }

      function setPhase(text, cls) {
        phaseEl.textContent = text;
        phaseEl.className = "phase" + (cls ? " " + cls : "");
      }

      /** Center readout: use Gbps when rate is in multi-gigabit territory. */
      function formatSpeedReadout(mbps) {
        if (!isFinite(mbps) || mbps < 0) return { value: "—", unit: "Mbps" };
        if (mbps >= 1000) {
          const g = mbps / 1000;
          const decimals = g >= 100 ? 1 : 2;
          const s = String(parseFloat(g.toFixed(decimals)));
          return { value: s, unit: "Gbps" };
        }
        if (mbps >= 100) return { value: String(parseFloat(mbps.toFixed(1))), unit: "Mbps" };
        return { value: String(parseFloat(mbps.toFixed(2))), unit: "Mbps" };
      }

      function formatStatLine(mbps) {
        const r = formatSpeedReadout(mbps);
        if (r.value === "—") return "—";
        return r.value + " " + r.unit;
      }

      function formatBytes(bytes) {
        if (!isFinite(bytes) || bytes < 0) return "—";
        const units = ["B", "KB", "MB", "GB", "TB"];
        let u = 0;
        let x = bytes;
        while (x >= 1024 && u < units.length - 1) {
          x /= 1024;
          u++;
        }
        const decimals = u === 0 ? 0 : x >= 100 ? 0 : x >= 10 ? 1 : 2;
        return parseFloat(x.toFixed(decimals)) + " " + units[u];
      }

      function formatPingMs(ms) {
        if (!isFinite(ms)) return "—";
        return ms.toFixed(1) + " ms";
      }

      function mbpsFromBytesDelta(bytes, dtSec) {
        if (dtSec <= 0) return 0;
        return (bytes * 8) / (dtSec * 1e6);
      }

      /** Smallest 1/2/5/10 × 10^n Mbps that is >= x (e.g. 96 → 100). */
      function niceCeilingMbps(x) {
        if (!isFinite(x) || x <= 0) return GAUGE_DEFAULT_MAX_MBPS;
        const xMin = Math.max(x, 1);
        const exp = Math.floor(Math.log10(xMin));
        const base = Math.pow(10, exp);
        for (let i = 0; i < 4; i++) {
          const m = [1, 2, 5, 10][i];
          const v = m * base;
          if (xMin <= v) return v;
        }
        return 10 * base;
      }

      /** Dial labels: plain Mbps numbers (0, 25, 50… or 0, 250, 500… at 1 Gbps max). */
      function formatTickMbps(mbpsVal) {
        return String(Math.round(mbpsVal));
      }

      /**
       * Upper semicircle: same θ as path (π → 0 along arc). Outside the arc is smaller y, so y = cy - r*sin(θ).
       */
      function gaugePolar(theta, r) {
        return {
          x: GAUGE_CX + r * Math.cos(theta),
          y: GAUGE_CY - r * Math.sin(theta),
        };
      }

      function renderGaugeScale(maxMbps) {
        while (gaugeLabels.firstChild) gaugeLabels.removeChild(gaugeLabels.firstChild);
        for (let i = 0; i < GAUGE_LABEL_FRACS.length; i++) {
          const frac = GAUGE_LABEL_FRACS[i];
          const theta = Math.PI * (1 - frac);
          const cos = Math.cos(theta);
          const sin = Math.sin(theta);
          const mbpsVal = frac * maxMbps;
          const pl = gaugePolar(theta, LABEL_R);
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("class", "gauge-label");
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("dominant-baseline", "middle");
          const pad = 1;
          text.setAttribute("x", String(pl.x + cos * pad));
          text.setAttribute("y", String(pl.y - sin * pad));
          text.textContent = formatTickMbps(mbpsVal);
          gaugeLabels.appendChild(text);
        }
      }

      function bumpGaugeMaxFromObservation(mbps) {
        let next = niceCeilingMbps(mbps);
        /* Stay on a 1 Gbps-wide scale until we actually exceed 1000 Mbps (avoids 2 G max from burst inst spikes). */
        if (mbps < 1000) {
          next = Math.min(next, 1000);
        }
        if (next > gaugeMaxMbps) {
          gaugeMaxMbps = next;
          renderGaugeScale(gaugeMaxMbps);
        }
      }

      function updateGaugeFill(displayMbps) {
        const t = Math.min(Math.max(displayMbps, 0) / gaugeMaxMbps, 1);
        const offset = ARC_LEN * (1 - t);
        gaugeFill.style.strokeDasharray = String(ARC_LEN);
        gaugeFill.style.strokeDashoffset = String(offset);
        const r = formatSpeedReadout(displayMbps);
        speedValueEl.textContent = r.value;
        speedUnitEl.textContent = r.unit;
      }

      function easeOutCubic(t) {
        const x = Math.min(1, Math.max(0, t));
        return 1 - Math.pow(1 - x, 3);
      }

      /** Animate displayed speed and arc from `fromMbps` down to 0 (does not change gauge scale). */
      function animateGaugeToZero(fromMbps, durationMs) {
        const from = Math.max(0, fromMbps);
        if (from < 0.001 || durationMs <= 0) {
          updateGaugeFill(0);
          return Promise.resolve();
        }
        gaugeFill.style.transition = "none";
        return new Promise(function (resolve) {
          const start = performance.now();
          function frame() {
            /* rAF's `time` arg can lag `performance.now()` (previous frame / after tab sleep); mixing
             * it with `start` from performance.now() made progress negative and blew up unclamped ease. */
            const u = Math.min(1, Math.max(0, (performance.now() - start) / durationMs));
            const v = from * (1 - easeOutCubic(u));
            updateGaugeFill(v);
            if (u < 1) {
              requestAnimationFrame(frame);
            } else {
              updateGaugeFill(0);
              gaugeFill.style.transition = "stroke-dashoffset 0.15s ease-out";
              resolve();
            }
          }
          requestAnimationFrame(frame);
        });
      }

      function updateGauge(ema, peak) {
        bumpGaugeMaxFromObservation(Math.max(ema, peak, 1));
        updateGaugeFill(ema);
      }

      async function measurePing(samples) {
        const times = [];
        for (let i = 0; i < samples; i++) {
          const t0 = performance.now();
          await fetch(apiUrl("/api/latency"), { cache: "no-store" });
          times.push(performance.now() - t0);
        }
        times.sort((a, b) => a - b);
        return times[Math.floor(times.length / 2)];
      }

      /** Samples /api/latency for `durationMs` while download or upload runs in parallel. */
      async function measurePingDuringWindow(durationMs) {
        const times = [];
        const end = performance.now() + durationMs;
        while (performance.now() < end) {
          const t0 = performance.now();
          try {
            await fetch(apiUrl("/api/latency"), { cache: "no-store" });
            times.push(performance.now() - t0);
          } catch (e) {
            /* ignore; keep sampling until window ends */
          }
        }
        if (!times.length) return NaN;
        times.sort((a, b) => a - b);
        return times[Math.floor(times.length / 2)];
      }

      async function downloadWorker(signal, counter) {
        const res = await fetch(apiUrl("/api/download"), { signal, cache: "no-store" });
        const reader = res.body.getReader();
        try {
          for (;;) {
            const { done, value } = await reader.read();
            if (done) break;
            counter.bytes += value.byteLength;
          }
        } catch (e) {
          if (e.name !== "AbortError") throw e;
        }
      }

      /**
       * Web Crypto limits getRandomValues() to at most 65,536 bytes per call.
       * Filling a 1 MiB buffer in one shot throws QuotaExceededError — no XHR is sent, so upload "never starts".
       */
      function fillBufferRandom(u8) {
        const step = 65536;
        let i = 0;
        while (i < u8.length) {
          crypto.getRandomValues(u8.subarray(i, Math.min(i + step, u8.length)));
          i += step;
        }
      }

      /** Absolute upload URL (subpath-safe; see apiUrl). */
      function uploadEndpointUrl() {
        return apiUrl("/api/upload");
      }

      /**
       * POST raw bytes via XMLHttpRequest — same reliable pattern as LibreSpeed / similar tools.
       * fetch() can behave differently with binary bodies, connection pooling, and extensions.
       */
      function xhrPostUpload(uint8) {
        return new Promise(function (resolve, reject) {
          const xhr = new XMLHttpRequest();
          activeUploadXhrs.add(xhr);
          xhr.open("POST", uploadEndpointUrl(), true);
          xhr.setRequestHeader("Content-Type", "application/octet-stream");
          xhr.responseType = "json";
          xhr.onloadend = function () {
            activeUploadXhrs.delete(xhr);
          };
          xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
              const b = xhr.response;
              if (b && typeof b === "object" && "bytes" in b) {
                resolve(b);
                return;
              }
              try {
                resolve(JSON.parse(xhr.responseText || "{}"));
              } catch (e) {
                reject(new Error("Invalid JSON from upload"));
              }
            } else {
              reject(new Error("Upload HTTP " + xhr.status));
            }
          };
          xhr.onerror = function () {
            reject(new Error("Upload network error"));
          };
          xhr.send(uint8);
        });
      }

      async function uploadWorkerChunked(counter, deadline) {
        const chunkSize = 1024 * 1024;
        while (performance.now() < deadline) {
          const chunk = new Uint8Array(chunkSize);
          fillBufferRandom(chunk);
          counter.bytes += chunk.byteLength;
          await xhrPostUpload(chunk);
        }
      }

      async function runParallelTimed(workFn, counters) {
        const controllers = [];
        const promises = [];
        const n = PARALLEL_DOWNLOAD_STREAMS;
        for (let i = 0; i < n; i++) {
          controllers.push(new AbortController());
        }
        controllers.forEach((c) => activeDownloadAborts.add(c));
        for (let i = 0; i < n; i++) {
          const c = { bytes: 0 };
          counters.push(c);
          promises.push(workFn(controllers[i], c));
        }
        await new Promise((r) => setTimeout(r, TEST_DURATION_MS));
        controllers.forEach((c) => c.abort());
        await Promise.allSettled(promises);
        controllers.forEach((c) => activeDownloadAborts.delete(c));
      }

      async function runDownloadTest() {
        setPhase("Download", "download");
        const counters = [];
        let ema = 0;
        let peak = 0;
        let lastBytes = 0;
        let lastT = performance.now();
        const tick = () => {
          const now = performance.now();
          const total = counters.reduce((s, c) => s + c.bytes, 0);
          const inst = mbpsFromBytesDelta(total - lastBytes, (now - lastT) / 1000);
          lastBytes = total;
          lastT = now;
          ema = EMA_ALPHA * inst + (1 - EMA_ALPHA) * ema;
          if (ema > peak) peak = ema;
          updateGauge(ema, peak);
        };
        const iv = setInterval(tick, 120);
        await runParallelTimed((ctrl, c) => downloadWorker(ctrl.signal, c), counters);
        clearInterval(iv);
        const totalBytes = counters.reduce((s, c) => s + c.bytes, 0);
        const avg = mbpsFromBytesDelta(totalBytes, TEST_DURATION_MS / 1000);
        bumpGaugeMaxFromObservation(Math.max(avg, peak));
        updateGaugeFill(avg);
        await animateGaugeToZero(avg, GAUGE_RESET_MS);
        return { totalBytes, avg, peak };
      }

      async function runUploadTest() {
        setPhase("Upload", "upload");
        updateGaugeFill(0);
        const counters = [];
        let ema = 0;
        let peak = 0;
        let lastBytes = 0;
        let lastT = performance.now();
        const tick = () => {
          const now = performance.now();
          const total = counters.reduce((s, c) => s + c.bytes, 0);
          const inst = mbpsFromBytesDelta(total - lastBytes, (now - lastT) / 1000);
          lastBytes = total;
          lastT = now;
          ema = EMA_ALPHA * inst + (1 - EMA_ALPHA) * ema;
          if (ema > peak) peak = ema;
          updateGauge(ema, peak);
        };
        const iv = setInterval(tick, 120);
        const uploadDeadline = performance.now() + TEST_DURATION_MS;
        const promises = [];
        for (let i = 0; i < PARALLEL_UPLOAD_STREAMS; i++) {
          const c = { bytes: 0 };
          counters.push(c);
          promises.push(uploadWorkerChunked(c, uploadDeadline));
        }
        await new Promise((r) => setTimeout(r, TEST_DURATION_MS));
        await Promise.allSettled(promises);
        clearInterval(iv);
        const totalBytes = counters.reduce((s, c) => s + c.bytes, 0);
        const avg = mbpsFromBytesDelta(totalBytes, TEST_DURATION_MS / 1000);
        bumpGaugeMaxFromObservation(Math.max(avg, peak));
        updateGaugeFill(avg);
        await animateGaugeToZero(avg, GAUGE_RESET_MS);
        return { totalBytes, avg, peak };
      }

      let running = false;

      btnStart.addEventListener("click", async () => {
        if (running) return;
        abortAllInFlight();
        running = true;
        btnStart.disabled = true;
        peakValEl.textContent = "—";
        dlAvgEl.textContent = "—";
        ulAvgEl.textContent = "—";
        pingValEl.textContent = "—";
        pingDlValEl.textContent = "—";
        pingUlValEl.textContent = "—";
        dlBytesValEl.textContent = "—";
        ulBytesValEl.textContent = "—";
        gaugeMaxMbps = GAUGE_DEFAULT_MAX_MBPS;
        renderGaugeScale(gaugeMaxMbps);
        updateGaugeFill(0);

        try {
          setPhase("Ping", "ping");
          const pingMs = await measurePing(6);
          pingValEl.textContent = formatPingMs(pingMs);

          const pingDuringDlPromise = measurePingDuringWindow(PING_UNDER_LOAD_MS);
          const dl = await runDownloadTest();
          const pingDuringDl = await pingDuringDlPromise;
          dlAvgEl.textContent = formatStatLine(dl.avg);
          pingDlValEl.textContent = formatPingMs(pingDuringDl);
          dlBytesValEl.textContent = formatBytes(dl.totalBytes);

          setPhase("Starting upload in 1s…", "");
          await new Promise((r) => setTimeout(r, PAUSE_AFTER_DOWNLOAD_MS));

          const pingDuringUlPromise = measurePingDuringWindow(PING_UNDER_LOAD_MS);
          const ul = await runUploadTest();
          const pingDuringUl = await pingDuringUlPromise;
          ulAvgEl.textContent = formatStatLine(ul.avg);
          pingUlValEl.textContent = formatPingMs(pingDuringUl);
          ulBytesValEl.textContent = formatBytes(ul.totalBytes);

          let peakAll = dl.peak;
          if (ul.peak > peakAll) peakAll = ul.peak;
          peakValEl.textContent = formatStatLine(peakAll);

          setPhase("Done", "");
          setTimeout(function () {
            openStatsModal();
          }, 0);
        } catch (err) {
          console.error(err);
          setPhase("Error", "");
          phaseEl.textContent = "Error — see console";
        } finally {
          running = false;
          btnStart.disabled = false;
        }
      });

      gaugeFill.style.strokeDasharray = String(ARC_LEN);
      gaugeFill.style.strokeDashoffset = String(ARC_LEN);
      renderGaugeScale(gaugeMaxMbps);
      updateGaugeFill(0);
      refreshClientIp();
    })();
  </script>
</body>
</html>
